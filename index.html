<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Plaza Prototype</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Unbounded:wght@500;700&display=swap");

      :root {
        color-scheme: dark;
        --ink: #e9edf3;
        --glass: rgba(20, 22, 27, 0.78);
        --edge: rgba(170, 178, 190, 0.28);
        --neon-cyan: #c8d4e4;
        --neon-pink: #c8d4e4;
        --neon-lime: #c8d4e4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
        background: linear-gradient(140deg, #14171d 0%, #191d25 48%, #11141a 100%);
      }

      body.mouse-hidden {
        cursor: none;
      }

      body.mouse-hidden * {
        cursor: none !important;
      }

      body.theme-dark {
        background:
          radial-gradient(circle at 18% 20%, rgba(24, 28, 42, 0.36), transparent 42%),
          radial-gradient(circle at 84% 78%, rgba(30, 36, 52, 0.22), transparent 40%),
          linear-gradient(135deg, #0a0c10 0%, #12161d 44%, #0f131a 100%);
      }

      #game-root,
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .mask-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(170, 119, 255, 0.24), transparent 38%),
          linear-gradient(135deg, rgba(13, 14, 32, 0.95), rgba(24, 22, 50, 0.95));
        pointer-events: auto;
        backdrop-filter: blur(8px);
      }

      .mask-overlay.hidden {
        display: none;
      }

      .mask-grid {
        width: min(860px, calc(100vw - 40px));
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 14px;
      }

      .mask-option {
        border: 1px solid rgba(120, 198, 255, 0.28);
        border-radius: 14px;
        background:
          linear-gradient(165deg, rgba(38, 40, 88, 0.84), rgba(26, 19, 50, 0.84));
        padding: 10px;
        cursor: pointer;
        transition: transform 130ms ease, box-shadow 130ms ease, border-color 130ms ease;
      }

      .mask-option:hover {
        transform: translateY(-2px) scale(1.01);
        border-color: rgba(120, 237, 255, 0.64);
        box-shadow:
          0 0 0 1px rgba(97, 237, 255, 0.2),
          0 14px 26px rgba(0, 0, 0, 0.35);
      }

      .mask-option img {
        width: 100%;
        display: block;
        border-radius: 10px;
      }

      .action-orb-shell {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 26;
      }

      .action-orb-backdrop {
        position: absolute;
        inset: 0;
        border: none;
        background: rgba(7, 10, 16, 0.45);
        pointer-events: auto;
      }

      .action-launcher {
        position: absolute;
        left: 18px;
        bottom: 18px;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 1px solid rgba(215, 235, 255, 0.5);
        background: linear-gradient(160deg, rgba(28, 38, 58, 0.96), rgba(22, 27, 40, 0.96));
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.34);
        color: #eaf4ff;
        font-size: 1.9rem;
        font-family: Helvetica, Arial, sans-serif;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        pointer-events: auto;
        transition: left 320ms cubic-bezier(0.2, 0.72, 0.2, 1), top 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          bottom 320ms cubic-bezier(0.2, 0.72, 0.2, 1), right 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          transform 320ms cubic-bezier(0.2, 0.72, 0.2, 1), border-color 180ms ease, box-shadow 180ms ease;
      }

      .action-launcher:hover {
        border-color: rgba(164, 236, 255, 0.8);
        box-shadow: 0 0 0 1px rgba(96, 219, 255, 0.22), 0 12px 24px rgba(0, 0, 0, 0.4);
      }

      .action-dial-item {
        position: absolute;
        left: 50%;
        top: 50%;
        border: none;
        border-radius: 14px;
        background: transparent;
        padding: 3px;
        width: 90px;
        height: 90px;
        backdrop-filter: blur(5px);
        transform: translate(-50%, -50%) scale(0.62);
        opacity: 0;
        pointer-events: none;
        cursor: pointer;
        transition: transform 280ms cubic-bezier(0.2, 0.74, 0.2, 1), opacity 220ms ease, border-color 160ms ease;
        box-shadow: none;
      }

      .action-dial-item.open {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      .action-dial-item:hover {
        border-color: transparent;
      }

      .action-dial-icon {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 0;
        pointer-events: none;
      }

      .action-dial-label {
        position: absolute;
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%) translateY(-4px);
        color: rgba(242, 247, 255, 0.95);
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .action-dial-item:hover .action-dial-label,
      .action-dial-item:focus-visible .action-dial-label {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .action-dial-item:disabled {
        opacity: 0.5;
        pointer-events: none;
      }

      .action-orb-shell.open .action-launcher {
        left: 50%;
        top: 50%;
        right: auto;
        bottom: auto;
        transform: translate(-50%, -50%) scale(1.05);
      }

      .action-orb-shell.mobile-layout .action-dial-item {
        width: 76px;
        height: 76px;
        min-width: 0;
        padding: 2px;
      }

      .action-orb-shell.mobile-layout.open .action-launcher {
        left: 50%;
        top: auto;
        right: auto;
        bottom: 108px;
        transform: translateX(-50%) scale(1.03);
      }

      .action-orb-hidden {
        display: none;
      }

      .file-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(7, 9, 12, 0.8);
        pointer-events: auto;
        z-index: 30;
      }

      .file-overlay.hidden {
        display: none;
      }

      .file-overlay-panel {
        width: min(920px, calc(100vw - 28px));
        max-height: min(86vh, 760px);
        background: rgba(19, 22, 28, 0.98);
        border: 1px solid rgba(185, 196, 208, 0.2);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.38);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .file-overlay-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: rgba(29, 34, 42, 0.78);
      }

      .file-overlay-title {
        margin: 0;
        color: #e8f5ff;
        font-size: 0.95rem;
      }

      .file-overlay-icon-btn {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 0;
        cursor: pointer;
      }

      .file-overlay-icon-btn svg {
        width: 17px;
        height: 17px;
      }

      .file-overlay-close {
        border: 1px solid rgba(176, 186, 198, 0.35);
        color: #edf2f8;
        background: rgba(35, 42, 51, 0.92);
      }

      .file-overlay-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-overlay-delete {
        border: 1px solid rgba(200, 146, 146, 0.5);
        color: #ffe8e8;
        background: rgba(92, 38, 38, 0.92);
      }

      .file-overlay-download {
        border: 1px solid rgba(176, 186, 198, 0.35);
        color: #eaf0f7;
        background: rgba(37, 44, 53, 0.92);
      }

      .file-overlay-meta {
        border: 1px solid rgba(176, 186, 198, 0.35);
        color: #eaf0f7;
        background: rgba(37, 44, 53, 0.92);
      }

      .file-overlay-generic {
        min-height: 220px;
        border: 1px solid rgba(176, 186, 198, 0.24);
        border-radius: 10px;
        background: rgba(23, 27, 36, 0.82);
        color: #dce8f6;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 16px;
      }

      .file-overlay-generic h4 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .file-overlay-generic p {
        margin: 0;
        opacity: 0.88;
      }

      .file-overlay-metadata {
        border: 1px solid rgba(176, 186, 198, 0.26);
        border-radius: 8px;
        background: rgba(26, 30, 40, 0.85);
        padding: 10px;
        margin-bottom: 10px;
        display: grid;
        gap: 6px;
      }

      .file-overlay-metadata-row {
        font-size: 0.86rem;
        color: #dbe7f6;
      }

      .file-overlay-body {
        padding: 12px;
        overflow: auto;
      }

      .file-overlay-image,
      .file-overlay-pdf {
        width: 100%;
        min-height: 68vh;
        border: none;
        border-radius: 8px;
        background: #fff;
      }

      .file-overlay-audio {
        width: 100%;
      }

      .file-overlay-folder-list {
        margin-top: 10px;
        border: 1px solid rgba(176, 186, 198, 0.26);
        border-radius: 8px;
        background: rgba(26, 30, 40, 0.85);
        max-height: min(42vh, 380px);
        overflow: hidden;
      }

      .file-overlay-folder-controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(176, 186, 198, 0.16);
      }

      .file-overlay-folder-sort-label {
        font-size: 0.74rem;
        color: #b8c7d8;
        letter-spacing: 0.02em;
      }

      .file-overlay-folder-sort {
        border-radius: 6px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(37, 44, 53, 0.92);
        color: #eaf0f7;
        padding: 4px 8px;
        font-size: 0.74rem;
      }

      .file-overlay-folder-items {
        max-height: min(36vh, 320px);
        overflow: auto;
      }

      .file-overlay-folder-row {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(176, 186, 198, 0.14);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-overlay-folder-row:last-child {
        border-bottom: none;
      }

      .file-overlay-folder-name {
        font-size: 0.84rem;
        color: #e5eef9;
        flex: 1 1 auto;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .file-overlay-folder-meta {
        font-size: 0.74rem;
        color: #b8c7d8;
        white-space: nowrap;
        flex: 0 0 auto;
      }

      .file-overlay-folder-download {
        border-radius: 7px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(37, 44, 53, 0.92);
        color: #eaf0f7;
        padding: 4px 8px;
        font-size: 0.72rem;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .file-overlay-folder-add {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(37, 44, 53, 0.92);
        color: #eaf0f7;
        font-size: 1rem;
        line-height: 1;
        font-weight: 700;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .file-overlay-folder-empty {
        padding: 10px;
        font-size: 0.84rem;
        color: #c5d6e8;
      }

      .file-overlay-model-tools {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .file-overlay-model-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-overlay-model-swatch {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid rgba(176, 186, 198, 0.42);
        flex: 0 0 auto;
      }

      .file-overlay-model-btn {
        border-radius: 8px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        color: #eaf0f7;
        background: rgba(37, 44, 53, 0.92);
        padding: 8px 10px;
        cursor: pointer;
      }

      .file-overlay-color-modal {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(10, 14, 22, 0.5);
        z-index: 4;
      }

      .file-overlay-color-modal.hidden {
        display: none;
      }

      .file-overlay-color-card {
        width: min(360px, calc(100% - 24px));
        border-radius: 10px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(24, 30, 42, 0.98);
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .file-overlay-color-title {
        margin: 0;
        font-size: 0.94rem;
        color: #eaf4ff;
      }

      .file-overlay-color-row {
        display: flex;
        gap: 8px;
      }

      .file-overlay-color-picker {
        width: 46px;
        height: 36px;
        border: none;
        padding: 0;
        background: transparent;
      }

      .file-overlay-color-hex {
        flex: 1;
        border-radius: 8px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(37, 44, 53, 0.92);
        color: #eaf0f7;
        padding: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .file-overlay-color-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .file-overlay-color-cancel,
      .file-overlay-color-apply {
        border-radius: 8px;
        border: 1px solid rgba(176, 186, 198, 0.35);
        background: rgba(37, 44, 53, 0.92);
        color: #eaf0f7;
        padding: 7px 10px;
        cursor: pointer;
      }

      .touch-joystick {
        position: absolute;
        left: 16px;
        bottom: 16px;
        width: 112px;
        height: 112px;
        border-radius: 999px;
        border: 1px solid rgba(180, 216, 255, 0.34);
        background: rgba(20, 24, 40, 0.35);
        backdrop-filter: blur(6px);
        pointer-events: auto;
        touch-action: none;
        z-index: 45;
      }

      .touch-joystick.hidden {
        display: none;
      }

      .touch-joystick-base {
        position: absolute;
        inset: 0;
      }

      .touch-joystick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 44px;
        height: 44px;
        margin-left: -22px;
        margin-top: -22px;
        border-radius: 999px;
        border: 1px solid rgba(204, 231, 255, 0.58);
        background: rgba(90, 150, 216, 0.38);
      }

      .status-toast {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        background: rgba(25, 30, 36, 0.95);
        color: #eef2f7;
        border: 1px solid rgba(176, 186, 198, 0.28);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.9rem;
        pointer-events: none;
      }

      .status-toast.hidden {
        display: none;
      }

      .mobile-hold-progress {
        position: fixed;
        width: 54px;
        height: 54px;
        border-radius: 999px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 70;
        border: 1px solid rgba(190, 238, 255, 0.58);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.26);
      }

      .mobile-hold-progress::after {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 999px;
        background: rgba(9, 14, 21, 0.82);
      }

      .mobile-hold-progress.hidden {
        display: none;
      }

      .env-panel {
        position: absolute;
        right: 18px;
        top: 210px;
        width: min(290px, calc(100vw - 36px));
        border: 1px solid rgba(188, 198, 210, 0.2);
        border-radius: 12px;
        background: rgba(24, 28, 34, 0.94);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
        padding: 10px;
        pointer-events: auto;
        display: grid;
        gap: 8px;
      }

      .env-panel.hidden {
        display: none;
      }

      .env-panel-title {
        margin: 0;
        color: #eaf6ff;
        font-size: 0.95rem;
      }

      .env-panel-row {
        display: grid;
        gap: 4px;
        color: #eaf6ff;
        font-size: 0.88rem;
      }

      .env-panel-row input {
        border-radius: 8px;
        border: 1px solid rgba(184, 196, 210, 0.26);
        background: rgba(31, 36, 43, 0.9);
        color: #edf8ff;
        padding: 8px;
      }

      .env-panel-apply,
      .env-panel-close {
        border: 1px solid rgba(184, 196, 210, 0.26);
        border-radius: 8px;
        background: rgba(37, 42, 50, 0.94);
        color: #edf8ff;
        padding: 8px;
        cursor: pointer;
      }

      .graffiti-palette {
        position: absolute;
        left: 18px;
        bottom: 18px;
        display: flex;
        gap: 8px;
        padding: 8px;
        border-radius: 12px;
        border: 1px solid rgba(186, 196, 210, 0.22);
        background: rgba(23, 27, 33, 0.94);
        pointer-events: auto;
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.3);
      }

      .graffiti-palette.hidden {
        display: none;
      }

      .graffiti-color {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 2px solid rgba(225, 233, 245, 0.35);
        cursor: pointer;
      }

      .graffiti-color.active {
        outline: 2px solid rgba(225, 244, 255, 0.95);
      }

      .graffiti-size-wrap {
        display: grid;
        gap: 4px;
        margin-left: 6px;
        min-width: 120px;
      }

      .graffiti-size-label {
        font-size: 0.75rem;
        color: #d6efff;
      }

      .graffiti-size-slider {
        width: 100%;
        accent-color: var(--neon-pink);
      }

      .graffiti-clear-btn {
        margin-top: 2px;
        border-radius: 8px;
        border: 1px solid rgba(255, 149, 149, 0.52);
        background: rgba(97, 25, 25, 0.92);
        color: #ffe9e9;
        padding: 6px 8px;
        cursor: pointer;
      }

      .build-palette {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        width: min(960px, calc(100vw - 28px));
        border: 1px solid var(--edge);
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(20, 27, 56, 0.96), rgba(30, 18, 50, 0.95));
        box-shadow:
          0 12px 26px rgba(0, 0, 0, 0.38),
          inset 0 1px rgba(183, 224, 255, 0.12);
        padding: 8px;
        display: grid;
        gap: 8px;
        pointer-events: auto;
        z-index: 40;
      }

      .build-palette.hidden {
        display: none;
      }

      .build-palette-header {
        font-size: 0.82rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #d2ebff;
      }

      .build-shape-tray {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        gap: 6px;
      }

      .build-shape-btn {
        border: 1px solid rgba(130, 204, 255, 0.28);
        border-radius: 8px;
        background: linear-gradient(140deg, rgba(33, 39, 92, 0.92), rgba(53, 28, 79, 0.92));
        color: #e6f7ff;
        min-height: 54px;
        display: grid;
        gap: 3px;
        align-content: center;
        justify-items: center;
        cursor: grab;
      }

      .build-shape-btn:active {
        cursor: grabbing;
      }

      .build-shape-btn:hover {
        border-color: rgba(105, 242, 255, 0.74);
      }

      .build-shape-glyph {
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .build-shape-name {
        font-size: 0.68rem;
        opacity: 0.88;
      }

      .build-shape-editor {
        border-top: 1px solid rgba(158, 208, 255, 0.2);
        padding-top: 8px;
        display: grid;
        gap: 8px;
      }

      .build-shape-editor.hidden {
        display: none;
      }

      .decor-controls {
        position: absolute;
        right: 16px;
        top: 96px;
        width: 144px;
        border-radius: 12px;
        border: 1px solid rgba(160, 200, 255, 0.3);
        background: rgba(14, 18, 30, 0.86);
        backdrop-filter: blur(6px);
        padding: 10px;
        z-index: 35;
        pointer-events: auto;
      }

      .decor-controls.hidden {
        display: none;
      }

      .decor-controls-title {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        color: #c7deff;
        margin-bottom: 8px;
      }

      .decor-controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .decor-controls-legend {
        margin-top: 8px;
        display: grid;
        gap: 3px;
        font-size: 0.68rem;
        color: #d7e8ff;
        opacity: 0.9;
      }

      .decor-controls-legend strong {
        color: #ffffff;
        font-weight: 600;
      }

      .decor-btn {
        border: 1px solid rgba(177, 208, 255, 0.3);
        border-radius: 8px;
        background: rgba(36, 46, 68, 0.9);
        color: #ecf4ff;
        font-size: 0.74rem;
        padding: 8px 6px;
        cursor: pointer;
      }

      .decor-btn:active {
        transform: translateY(1px);
      }
